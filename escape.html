<meta charset="UTF-8">

<title>🔑 방탈출 놀이</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
:root{--navy:#1B2E4A;--navy-l:#2A4470;--navy-g:#3B6BA5;--sky:#4DA3E8;--sky-p:#E8F4FD;--red:#E0465A;--green:#2DAA6E;--orange:#E8833A;--gold:#D4A017;--purple:#B15CFF;--bg:#F3F5F8;--card:#FFF;--tx:#1E2D3D;--tx2:#6B7D8F;--tx3:#A4B3C2;--bdr:#E0E7EF;--sh:0 1px 4px rgba(27,46,74,.07);--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh;overflow-x:hidden;}
.hd{background:linear-gradient(135deg,var(--navy),var(--navy-g));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:space-between;}
.hd-l{display:flex;flex-direction:column;}
.hd-title{font-size:17px;font-weight:900;}
.hd-team{font-size:11px;opacity:.75;margin-top:1px;}
.sync-ind{font-size:10px;opacity:.85;display:flex;align-items:center;gap:4px;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sync-on{background:#4ADE80;}.sync-off{background:#F59E0B;}.sync-err{background:#EF4444;}
.wrap{max-width:640px;margin:0 auto;padding:16px 14px 40px;}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:800;transition:.12s;}
.btn:active{transform:scale(.97);}
.btn-lg{padding:16px;font-size:17px;width:100%;color:#fff;}
.btn-primary{background:linear-gradient(135deg,var(--sky),var(--navy-g));}
.btn-sub{background:#fff;color:var(--navy);border:2px solid var(--bdr);}
.btn-danger{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px;}
/* 이름/학년 선택 */
.name-row{display:flex;gap:8px;}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
@media(min-width:480px){.team-grid{grid-template-columns:repeat(3,1fr);}}
.team-btn{padding:26px 10px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;background:#fff;box-shadow:var(--sh);font-size:20px;font-weight:900;color:var(--navy);transition:.12s;}
.team-btn:active{transform:scale(.96);background:var(--sky-p);}
.team-btn.picked{background:var(--sky-p);box-shadow:inset 0 0 0 2px var(--sky);}
/* 홈 */
.keys-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;background:linear-gradient(135deg,#FFF7E0,#FFEFC2);border-radius:var(--r);margin-bottom:14px;border:1px solid #F0DFA0;}
.keys-bar .k{font-size:26px;filter:grayscale(1) opacity(.35);}
.keys-bar .k.on{filter:none;}
.keys-txt{font-size:12px;color:#7C5A00;font-weight:700;margin-left:8px;}
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.room-card{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:16px 12px;text-align:center;border:2px solid transparent;}
.room-card.done{border-color:var(--green);background:#F0FBF5;}
.room-emoji{font-size:32px;}
.room-name{font-size:13px;font-weight:800;margin-top:4px;}
.room-prog{font-size:12px;color:var(--tx2);margin-top:4px;font-weight:700;}
.room-bar{height:6px;background:#E7ECF2;border-radius:3px;margin-top:6px;overflow:hidden;}
.room-bar-f{height:100%;background:var(--sky);border-radius:3px;transition:width .3s;}
.room-card.done .room-bar-f{background:var(--green);}
.scan-fab{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:min(560px,calc(100% - 32px));z-index:40;}
.scan-fab button{padding:18px;border-radius:16px;font-size:18px;box-shadow:0 6px 20px rgba(27,46,74,.35);}
.team-switch{font-size:11px;color:var(--tx3);text-align:center;margin-top:18px;text-decoration:underline;cursor:pointer;}
/* 스캔 화면 */
.scan-wrap{text-align:center;}
.cam-box{position:relative;width:100%;max-width:420px;margin:10px auto;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:1/1;}
.cam-box video{width:100%;height:100%;object-fit:cover;}
.cam-frame{position:absolute;inset:14%;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 999px rgba(0,0,0,.35);}
.cam-msg{font-size:12px;color:var(--tx2);margin:8px 0;}
.manual-box{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-top:16px;}
.manual-box h4{font-size:13px;color:var(--tx2);margin-bottom:8px;}
.manual-row{display:flex;gap:8px;}
.txt-inp{flex:1;padding:12px;border:2px solid var(--bdr);border-radius:10px;font-size:16px;font-family:inherit;text-transform:uppercase;}
.txt-inp:focus{border-color:var(--sky);outline:none;}
/* 문제 화면 */
.q-badges{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.b-id{background:var(--navy);color:#fff;}
.b-grade{background:var(--sky-p);color:var(--navy-g);}
.b-unit{background:#F0F3F7;color:var(--tx2);}
.grade-warn{background:#FFF3D6;border:1px solid #F5DFA0;border-radius:10px;padding:10px 12px;font-size:13px;color:#7C5A00;font-weight:700;margin-bottom:12px;}
.qimg{margin:10px 0;text-align:center;background:#FAFBFC;border:1px solid #E5EAEF;border-radius:10px;padding:10px;}
.qimg svg{width:100%;height:auto;max-width:320px;display:block;margin:0 auto;}
.qimg.wide svg{max-width:600px;}
.qimg table.plain{width:100%;max-width:230px;margin:0 auto 10px;border-collapse:collapse;}
.qimg table.plain th,.qimg table.plain td{border:1px solid #ccc;padding:5px 8px;font-size:12px;text-align:center;}
.qimg table.plain th{background:#F0F3F7;}
.pictogram{font-size:30px;text-align:center;letter-spacing:8px;}
.dotgrid{font-size:19px;text-align:center;letter-spacing:2px;color:var(--navy-g);line-height:1.6;font-weight:700;}
.q-text{font-size:16px;font-weight:600;margin:12px 0;line-height:1.6;}
.ans-row{display:flex;gap:8px;margin-top:10px;}
.ans-row .txt-inp{text-transform:none;}
.fb-box{margin-top:14px;padding:14px;border-radius:12px;font-size:15px;font-weight:800;text-align:center;}
.fb-ok{background:#E8F9EF;color:var(--green);border:1px solid #B9EDCB;}
.fb-bad{background:#FDEEEF;color:var(--red);border:1px solid #F5C6CB;}
.fb-lock{background:#FFF3D6;color:#7C5A00;border:1px solid #F5DFA0;}
.fb-review{background:#EAF2FB;color:var(--navy-g);border:1px solid #C7DCF2;}
.center-icon{font-size:42px;text-align:center;margin-bottom:6px;}
.cooldown-txt{font-size:12px;color:var(--tx3);text-align:center;margin-top:8px;}
/* 풀이 공간 */
.scr-hd{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px;}
.scr-hd .lbl{font-size:12px;font-weight:800;color:var(--tx2);}
.scr-hd button{border:1px solid var(--bdr);background:#fff;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--tx);cursor:pointer;font-family:inherit;}
.canvas-wrap{position:relative;height:220px;border:1px solid var(--bdr);border-radius:10px;background:#fcfcfd;touch-action:none;overflow:hidden;}
.canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
.finale{text-align:center;padding:40px 16px;}
.finale .em{font-size:64px;}
.finale h2{font-size:22px;margin:10px 0;color:var(--navy);}
.finale p{font-size:14px;color:var(--tx2);line-height:1.7;}
.top-back{font-size:13px;color:var(--sky);font-weight:800;cursor:pointer;margin-bottom:10px;display:inline-block;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:16px;padding:26px 20px;max-width:340px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.25);}
.modal-box .em{font-size:56px;}
.modal-box h3{font-size:19px;margin:8px 0;color:var(--navy);}
.modal-box p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px;}
</style>
</head>

/* ===================== 상태 ===================== */
let myName=localStorage.getItem("escape_name")||"";
let myGrade=localStorage.getItem("escape_grade")||"";
let safeKey=localStorage.getItem("escape_key")||"";
let team=localStorage.getItem("escape_team")||"";
let solvedIds={},randomPicks={},cooldown={};
let unlocked={},helpRequest=null;
let dbRef=null,myLastSaveTs=0,saveTimer=null;
let rosterAllRef=null,rosterAll={},teamGrades=new Set();
let pickedGrade=null;
let view="name",activeQid=null,pendingFinale=false;
let videoStream=null,scanRAF=null;
let canvasCtx=null,drawing=false,lastX=0,lastY=0;

function sanitizeKey(name){return name.trim().replace(/[.#$\[\]\/]/g,"_").slice(0,40);}
function escapeHtml(s){return (s||"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function findQ(qid){const rid=qid.slice(0,2);return (QUESTIONS[rid]||[]).find(q=>q.qid===qid);}
function normalize(s){return (s||"").toString().trim().replace(/\s+/g,"").toLowerCase();}
function roomProgress(rid){return QUESTIONS[rid].filter(q=>solvedIds[q.qid]).length;}
function totalKeys(){return ROOMS.filter(r=>roomProgress(r.id)===8).length;}
function loadLocal(){
  if(!team)return;
  try{const d=JSON.parse(localStorage.getItem("escape_state_"+team)||"{}");solvedIds=d.solvedIds||{};randomPicks=d.randomPicks||{};cooldown=d.cooldown||{};}catch(e){}
}
function persistLocal(){if(!team)return;localStorage.setItem("escape_state_"+team,JSON.stringify({solvedIds,randomPicks,cooldown}));}

function connectFirebase(){
  if(!team)return;
  dbRef=db.ref("escape_data/team"+team);
  dbRef.on("value",snap=>{
    setSync("on");
    const d=snap.val();
    if(d){
      if(!(d.ts&&Math.abs(d.ts-myLastSaveTs)<2000)){
        solvedIds=d.solvedIds||{};randomPicks=d.randomPicks||{};cooldown=d.cooldown||{};
        persistLocal();
      }
      unlocked=d.unlocked||{};
      helpRequest=d.helpRequest||null;
    }
    if(view==="home")renderHome();
  },()=>setSync("err"));
}
function requestHelp(roomId){
  const room=ROOMS.find(r=>r.id===roomId);
  if(!room||!dbRef)return;
  const roomQids=QUESTIONS[roomId].map(x=>x.qid);
  const solvedCount=roomQids.filter(id=>solvedIds[id]).length;
  if(solvedCount>=8)return;
  const nextQid=roomQids[solvedCount];
  if(!confirm(room.emoji+" "+room.name+"의 다음 QR 코드를 못 찾으시겠어요?\n선생님께 도움을 요청할까요?"))return;
  const req={qid:nextQid,roomId:roomId,roomName:room.name,ts:Date.now()};
  dbRef.child("helpRequest").set(req).then(()=>{
    helpRequest=req;
    if(view==="home")renderHome();
  });
}
function cancelHelp(){
  if(dbRef)dbRef.child("helpRequest").remove();
  helpRequest=null;
  if(view==="home")renderHome();
}
function openUnlocked(qid){
  if(dbRef)dbRef.child("helpRequest").remove();
  helpRequest=null;
  showGradeGate(qid,"active");
}
function computeTeamGrades(){
  teamGrades=new Set();
  Object.values(rosterAll).forEach(s=>{if(s&&team&&String(s.teamId)===team)teamGrades.add(Number(s.grade));});
}
function computeEffectiveGrade(required){
  if(teamGrades.size===0)return required;
  if(teamGrades.has(required))return required;
  for(let g=required+1;g<=6;g++)if(teamGrades.has(g))return g;
  for(let g=required-1;g>=1;g--)if(teamGrades.has(g))return g;
  return required;
}
function connectRoster(){
  if(!safeKey)return;
  rosterAllRef=db.ref("escape_data/roster");
  rosterAllRef.on("value",snap=>{
    rosterAll=snap.val()||{};
    const mine=rosterAll[safeKey];
    const assignedTeam=(mine&&mine.teamId)?String(mine.teamId):"";
    if(assignedTeam&&assignedTeam!==team){
      team=assignedTeam;
      localStorage.setItem("escape_team",team);
      loadLocal();
      connectFirebase();
    }
    computeTeamGrades();
    if(!assignedTeam&&view!=="name"){view="waiting";renderWaiting();}
    else if(assignedTeam&&view==="waiting"){view="home";renderHome();}

  });
}
function setSync(s){
  const dot=document.getElementById("syncDot"),txt=document.getElementById("syncTxt");
  if(!dot)return;
  dot.className="sync-dot "+(s==="on"?"sync-on":s==="err"?"sync-err":"sync-off");

}
function saveCloud(){
  persistLocal();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(!dbRef)return;
    myLastSaveTs=Date.now();
    // update()를 써야 함: set()을 쓰면 unlocked/helpRequest 같은 다른 하위 데이터가 통째로 지워짐
    dbRef.update({solvedIds,randomPicks,cooldown,ts:myLastSaveTs}).then(()=>setSync("on")).catch(()=>setSync("err"));
  },400);
}

async function startCamera(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const vid=document.getElementById("vid");
    if(!vid)return;
    vid.srcObject=videoStream;
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d",{willReadFrequently:true});
    function tick(){
      if(view!=="scan")return;
      if(vid.readyState===vid.HAVE_ENOUGH_DATA){
        const vw=vid.videoWidth,vh=vid.videoHeight;
        // .cam-box는 정사각형(aspect-ratio:1/1)이고 video는 object-fit:cover로 표시됨.
        // 화면에 실제로 보이는 정사각형 영역(짧은 변 기준)을 원본 좌표로 환산한 뒤,
        // 그 안에서 안내 사각형(inset 14%) 영역만 잘라서 QR을 인식한다.
        const sq=Math.min(vw,vh);
        const sx0=(vw-sq)/2,sy0=(vh-sq)/2;
        const inset=sq*0.14;
        const gx=sx0+inset,gy=sy0+inset,gsize=sq*0.72;
        canvas.width=gsize;canvas.height=gsize;
        ctx.drawImage(vid,gx,gy,gsize,gsize,0,0,gsize,gsize);
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=jsQR(img.data,img.width,img.height);
        if(code&&code.data){
          const v=code.data.trim().toUpperCase();
          if(/^R[1-5]Q[1-8]$/.test(v)){stopCamera();handleScan(v);return;}
        }
      }
      scanRAF=requestAnimationFrame(tick);
    }
    scanRAF=requestAnimationFrame(tick);
  }catch(e){
    const msg=document.getElementById("camMsg");
    if(msg)msg.textContent="카메라를 사용할 수 없어요. 아래에 문제 번호를 직접 입력하세요.";
  }
}
function stopCamera(){
  if(scanRAF)cancelAnimationFrame(scanRAF);
  scanRAF=null;
  if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}
}

function handleScan(qid){
  const q=findQ(qid);
  if(!q){alert("존재하지 않는 문제예요.");view="home";renderHome();return;}
  const rid=qid.slice(0,2);
  if(solvedIds[qid]){showGradeGate(qid,"review");return;}
  const roomQids=QUESTIONS[rid].map(x=>x.qid);
  const solvedCount=roomQids.filter(id=>solvedIds[id]).length;
  const requiredQid=roomQids[solvedCount];
  if(qid!==requiredQid&&!unlocked[qid]){showQuestionScreen(qid,"locked",requiredQid);return;}
  showGradeGate(qid,"active");
}

function ensureRandomPick(q){
  if(q.type!=="random"||randomPicks[q.qid])return;
  let pool=q.pool;
  if(q.exclude&&randomPicks[q.exclude]){
    const excludeKo=randomPicks[q.exclude].ko;
    pool=pool.filter(p=>p.ko!==excludeKo);
  }
  const pick=pool[Math.floor(Math.random()*pool.length)];
  randomPicks[q.qid]={ko:pick.ko,en:pick.en};
  saveCloud();
}

  const room=ROOMS.find(r=>r.id===rid);
  if(mode!=="locked")ensureRandomPick(q);

  let bodyText=q.text;
  let expectedShown="";
  if(q.type==="random"){
    const pick=randomPicks[qid];
    bodyText=q.text+'<br><span style="font-size:20px;font-weight:900;color:var(--navy-g)">"'+(pick?pick.ko:"")+'"</span>';

  }else{

  }

  let h='<div class="top-back" onclick="goHome()">← 홈으로</div>';
  h+='<div class="card">';
  h+='<div class="q-badges"><span class="badge b-id">'+qid+"</span><span class=\"badge b-grade\">"+q.grade+"학년</span><span class=\"badge b-unit\">"+room.emoji+" "+room.name+" · "+q.unit+"</span></div>";

    h+='<div class="center-icon">🔒</div><div class="fb-box fb-lock">아직 열 수 없어요!<br>이 방은 순서대로 풀어야 해요.<br>지금 풀어야 할 문제: <b>'+requiredQid+"</b></div>";
    h+='<button class="btn btn-lg btn-primary" style="margin-top:10px" onclick="requestHelp(\''+rid+"');goHome();\">🙋 선생님께 도움 요청하기</button>";
    h+="</div>";
    h+='<button class="btn btn-lg btn-sub" style="margin-top:12px" onclick="goHome()">홈으로</button>';
    app.innerHTML=h;
    return;
  }

  if(q.img)h+='<div class="qimg'+(q.wide?" wide":"")+'">'+q.img+"</div>";
  h+='<div class="q-text">'+bodyText+"</div>";

  if(mode==="review"){
    h+='<div class="fb-box fb-review">✅ 이미 푼 문제예요<br>정답: <b>'+expectedShown+"</b></div>";
    h+="</div>";
    h+='<button class="btn btn-lg btn-sub" style="margin-top:12px" onclick="goHome()">홈으로</button>';
    app.innerHTML=h;
    return;
  }

  // active
  h+='<div class="ans-row"><input class="txt-inp" id="ansInp" placeholder="정답 입력" autocomplete="off" autocapitalize="off"><button class="btn btn-green" id="submitBtn" style="padding:0 18px" onclick="submitAnswer()">제출</button></div>';
  h+='<div id="fbArea"></div>';
  h+='<div class="scr-hd"><span class="lbl">✏️ 풀이 공간</span><button onclick="clearScratch()">🗑 지우기</button></div>';
  h+='<div class="canvas-wrap" id="canvasWrap"><canvas id="scratchCanvas"></canvas></div>';
  h+="</div>";
  app.innerHTML=h;
  renderCooldown();
  initCanvas();
  const inp=document.getElementById("ansInp");
  if(inp){inp.addEventListener("keydown",e=>{if(e.key==="Enter")submitAnswer();});inp.focus();}
}

function initCanvas(){
  const wrap=document.getElementById("canvasWrap");
  const canvas=document.getElementById("scratchCanvas");
  if(!wrap||!canvas)return;
  const rect=wrap.getBoundingClientRect();
  canvas.width=rect.width||wrap.offsetWidth||300;
  canvas.height=rect.height||wrap.offsetHeight||220;
  canvasCtx=canvas.getContext("2d");
  canvasCtx.lineWidth=2.5;canvasCtx.lineCap="round";canvasCtx.lineJoin="round";canvasCtx.strokeStyle="#1E2D3D";
  function posFromClient(clientX,clientY){
    const r=canvas.getBoundingClientRect();
    return {x:clientX-r.left,y:clientY-r.top};
  }
  function startDraw(x,y){drawing=true;lastX=x;lastY=y;}
  function moveDraw(x,y){
    if(!drawing||!canvasCtx)return;
    canvasCtx.beginPath();canvasCtx.moveTo(lastX,lastY);canvasCtx.lineTo(x,y);canvasCtx.stroke();
    lastX=x;lastY=y;
  }
  function stopDraw(){drawing=false;}
  canvas.addEventListener("pointerdown",e=>{
    e.preventDefault();
    const p=posFromClient(e.clientX,e.clientY);startDraw(p.x,p.y);
    try{canvas.setPointerCapture(e.pointerId);}catch(err){}
  },{passive:false});
  canvas.addEventListener("pointermove",e=>{
    if(!drawing)return;
    e.preventDefault();
    const p=posFromClient(e.clientX,e.clientY);moveDraw(p.x,p.y);
  },{passive:false});
  canvas.addEventListener("pointerup",stopDraw);
  canvas.addEventListener("pointercancel",stopDraw);
  canvas.addEventListener("pointerleave",stopDraw);
  canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    const t=e.touches[0];if(!t)return;
    const p=posFromClient(t.clientX,t.clientY);startDraw(p.x,p.y);
  },{passive:false});
  canvas.addEventListener("touchmove",e=>{
    e.preventDefault();
    const t=e.touches[0];if(!t)return;
    const p=posFromClient(t.clientX,t.clientY);moveDraw(p.x,p.y);
  },{passive:false});
  canvas.addEventListener("touchend",e=>{e.preventDefault();stopDraw();},{passive:false});
  canvas.addEventListener("touchcancel",e=>{e.preventDefault();stopDraw();},{passive:false});
  canvas.addEventListener("mousedown",e=>{const p=posFromClient(e.clientX,e.clientY);startDraw(p.x,p.y);});
  canvas.addEventListener("mousemove",e=>{if(drawing){const p=posFromClient(e.clientX,e.clientY);moveDraw(p.x,p.y);}});
  window.addEventListener("mouseup",stopDraw);
}
function clearScratch(){
  const canvas=document.getElementById("scratchCanvas");
  if(canvas&&canvasCtx)canvasCtx.clearRect(0,0,canvas.width,canvas.height);
}

function renderCooldown(){
  const qid=activeQid;const c=cooldown[qid];
  const fb=document.getElementById("fbArea");
  const btn=document.getElementById("submitBtn");
  if(!fb)return;
  const now=Date.now();
  if(c&&c.until>now){
    const remain=Math.ceil((c.until-now)/1000);
    fb.innerHTML='<div class="cooldown-txt">오답! '+remain+'초 후 다시 시도할 수 있어요.</div>';
    if(btn)btn.disabled=true;
    setTimeout(()=>{if(view==="question"&&activeQid===qid)renderCooldown();},500);
  }else{
    if(btn)btn.disabled=false;
  }
}

function submitAnswer(){
  const qid=activeQid,q=findQ(qid);
  const c=cooldown[qid];
  if(c&&c.until>Date.now())return;
  const inp=document.getElementById("ansInp");
  const val=inp?inp.value:"";
  const expected=q.type==="random"?(randomPicks[qid]?randomPicks[qid].en:""):q.answer;
  const fb=document.getElementById("fbArea");
  saveWorkSnapshot(qid);
  if(normalize(val)===normalize(expected)){
    solvedIds[qid]=true;
    delete cooldown[qid];
    saveCloud();
    const rid=qid.slice(0,2);
    const roomDone=roomProgress(rid)===8;
    const allDone=totalKeys()===5;
    if(allDone)pendingFinale=true;
    fb.innerHTML='<div class="fb-box fb-ok">🎉 정답입니다!<br>'+(roomDone?"이 방을 모두 클리어했어요! 황금열쇠 조각을 얻었습니다 🔑":"방 안 어딘가에 숨겨진 다음 QR 코드를 찾아보세요!")+'</div><button class="btn btn-lg btn-primary" style="margin-top:12px" onclick="openScan()">📷 다음 QR 스캔하기</button><button class="btn btn-lg btn-sub" style="margin-top:8px" onclick="goHome()">홈으로</button>';
    if(inp)inp.disabled=true;
    const sb=document.getElementById("submitBtn");if(sb)sb.disabled=true;
  }else{
    const attempts=((c&&c.attempts)||0)+1;
    const wait=attempts>=2?60:10;
    cooldown[qid]={until:Date.now()+wait*1000,attempts};
    saveCloud();
    fb.innerHTML='<div class="fb-box fb-bad">❌ 정답이 아니에요. 다시 시도해보세요!</div>';
    if(inp){inp.value="";}
    renderCooldown();
  }
}

if(myName&&safeKey){
  loadLocal();
  connectRoster();
  if(team){connectFirebase();view="home";renderHome();}
  else{view="waiting";renderWaiting();}
}else{view="name";renderNameEntry();}
